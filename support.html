  <head>
    <meta charset="utf-8" />

    <link rel="canonical" href="https://husofttech.com/support.html" />

    <meta property="og:description" content="Get support for HusoftTech apps." />

    <meta property="og:site_name" content="HusoftTech" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HusoftTech Support" />
    <meta name="twitter:description" content="Get support for HusoftTech apps." />
    <meta name="twitter:image" content="https://husofttech.com/assets/brand/logo.png" />
    <meta name="twitter:image:alt" content="HusoftTech logo" />
    <meta name="twitter:url" content="https://husofttech.com/support.html" />
    <link rel="icon" href="assets/brand/favicon-32.ico" type="image/x-icon" sizes="32x32" />
    <link rel="icon" href="assets/brand/favicon-48.ico" type="image/x-icon" sizes="48x48" />
    <link rel="icon" href="assets/brand/favicon-96.ico" type="image/x-icon" sizes="96x96" />
    <link rel="icon" href="assets/brand/favicon-192.ico" type="image/x-icon" sizes="192x192" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="particles-js" aria-hidden="true"></div>
    <main class="main-stage">
      <div class="center-panel">
        <div class="panel-scroll">
          <section class="container py-5">
            <article class="doc-sheet text-center">
              <a class="brand-link" href="index.html" aria-label="Go to home page">
                <img
                  class="brand-mark mb-3"
                  src="assets/brand/logo.png"
                  alt="HusoftTech logo"
                  width="72"
                  height="72"
                />
              </a>
              <p class="text-uppercase small mb-2">HusoftTech</p>
              <h1 class="display-6 fw-semibold mb-3">Support</h1>
              <p class="text-muted mb-2">
                Need help with any HusoftTech app? Email us and we will get back to you.
              </p>
              <p class="text-muted mb-4">
                If you are visiting this page, please email me with any feature request or any issue you want fixed.
              </p>
              <div class="row g-3 text-start mx-auto mb-4" style="max-width: 520px;">
                <div class="col-12 col-md-6">
                  <label class="form-label" for="support-type">Type</label>
                  <select class="form-select" id="support-type" required>
                    <option value="">Choose type</option>
                    <option value="FEATURE">Feature</option>
                    <option value="REQUEST">Request</option>
                    <option value="ISSUE">Issue</option>
                  </select>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="support-app">App Name</label>
                  <select class="form-select" id="support-app" required>
                    <option value="">Choose app</option>
                    <option value="TripChecklist">Trip Checklist</option>
                    <option value="MeowKit: Cat Care">MeowKit: Cat Care</option>
                    <option value="NorthPin Compass">NorthPin: Compass</option>
                    <option value="GlobePaper Wallpapers">GlobePaper Wallpapers</option>
                  </select>
                </div>
                <div class="col-12">
                  <p class="small text-muted mb-0">
                    Email subject preview:
                    <span id="subject-preview">TYPE | APP_NAME</span>
                  </p>
                </div>
              </div>
              <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                <a
                  class="btn btn-primary disabled"
                  id="send-support-email"
                  href="mailto:husofttech@gmail.com"
                  aria-disabled="true"
                >
                  Send Email
                </a>
                <a class="btn btn-outline-primary" href="index.html">Back to Home</a>
              </div>
              <p class="text-muted mt-4 mb-0">husofttech@gmail.com</p>
            </article>
          </section>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/support.js" defer></script>
  </body>
</html>
